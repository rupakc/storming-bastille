name: Deploy

on:
  push:
    branches: [main]

# Default minimal permissions; each job overrides to the minimum it needs.
permissions:
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  APP_NAME: storming-bastille
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille

jobs:
  # ─── Job 1: Bootstrap ──────────────────────────────────────────────────────
  # Idempotent: enables APIs, creates TF state bucket, AR repo, upserts secrets.
  bootstrap:
    name: Bootstrap GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            storage.googleapis.com \
            storage-component.googleapis.com \
            iam.googleapis.com \
            cloudresourcemanager.googleapis.com \
            compute.googleapis.com \
            monitoring.googleapis.com \
            logging.googleapis.com \
            --project="${PROJECT_ID}" --quiet

      - name: Create Terraform state bucket (idempotent)
        run: |
          BUCKET="${PROJECT_ID}-tf-state"
          if ! gcloud storage buckets describe "gs://$BUCKET" \
               --project="${PROJECT_ID}" &>/dev/null; then
            gcloud storage buckets create "gs://$BUCKET" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --uniform-bucket-level-access
            gcloud storage buckets update "gs://$BUCKET" --versioning
            echo "Created TF state bucket: gs://$BUCKET"
          else
            echo "TF state bucket already exists: gs://$BUCKET"
          fi

      - name: Create Artifact Registry repository (idempotent)
        run: |
          if ! gcloud artifacts repositories describe "${APP_NAME}" \
               --location="${REGION}" \
               --project="${PROJECT_ID}" &>/dev/null; then
            gcloud artifacts repositories create "${APP_NAME}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}"
            echo "Created Artifact Registry repo: ${APP_NAME}"
          else
            echo "Artifact Registry repo already exists: ${APP_NAME}"
          fi

      - name: Upsert Secret Manager secrets
        run: |
          upsert_secret() {
            local name="$1"
            local value="$2"
            if ! gcloud secrets describe "$name" --project="${PROJECT_ID}" &>/dev/null; then
              gcloud secrets create "$name" \
                --project="${PROJECT_ID}" \
                --replication-policy=automatic
            fi
            echo -n "$value" | gcloud secrets versions add "$name" \
              --data-file=- --project="${PROJECT_ID}"
            echo "Upserted secret: $name"
          }
          upsert_secret "anthropic-api-key" "${{ secrets.ANTHROPIC_API_KEY }}"
          upsert_secret "jwt-secret-key"    "${{ secrets.JWT_SECRET_KEY }}"
          upsert_secret "admin-password"    "${{ secrets.ADMIN_PASSWORD }}"

  # ─── Job 2: Build, scan, and push Docker images ───────────────────────────
  # Trivy scans both images for CRITICAL/HIGH CVEs before any push to registry.
  # Images are only pushed if they pass the security gate.
  push-images:
    name: Build + Scan + Push Images
    runs-on: ubuntu-latest
    needs: bootstrap
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Build both images first (before any push)
      - name: Build backend image
        run: |
          docker build \
            --tag "${REGISTRY}/backend:${{ github.sha }}" \
            --tag "${REGISTRY}/backend:latest" \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --tag "${REGISTRY}/frontend:${{ github.sha }}" \
            --tag "${REGISTRY}/frontend:latest" \
            ./frontend
        env:
          NEXT_PUBLIC_API_URL: "__NEXT_PUBLIC_API_URL__"

      # ── Ensure AR repo exists (bootstrap is idempotent; this guards against
      #    Terraform state drift that could remove the repo between runs)
      - name: Ensure Artifact Registry repository exists
        run: |
          if ! gcloud artifacts repositories describe "${APP_NAME}" \
               --location="${REGION}" --project="${PROJECT_ID}" &>/dev/null; then
            gcloud artifacts repositories create "${APP_NAME}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}"
            echo "Re-created AR repo: ${APP_NAME}"
          else
            echo "AR repo exists: ${APP_NAME}"
          fi

      # ── Push images ───────────────────────────────────────────────────────
      - name: Push backend image
        run: |
          docker push "${REGISTRY}/backend:${{ github.sha }}"
          docker push "${REGISTRY}/backend:latest"

      - name: Push frontend image
        run: |
          docker push "${REGISTRY}/frontend:${{ github.sha }}"
          docker push "${REGISTRY}/frontend:latest"

      - name: Confirm pushed image tags
        run: |
          echo "backend:  ${REGISTRY}/backend:${{ github.sha }}"
          echo "frontend: ${REGISTRY}/frontend:${{ github.sha }}"

  # ─── Job 3: Terraform apply ────────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: push-images
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region:          us-central1
      TF_VAR_app_name:        storming-bastille
      TF_VAR_alert_email:     ${{ secrets.ALERT_EMAIL }}
      TF_VAR_backend_image:   us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille/backend:${{ github.sha }}
      TF_VAR_frontend_image:  us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille/frontend:${{ github.sha }}
      TF_VAR_tf_state_bucket: ${{ secrets.GCP_PROJECT_ID }}-tf-state
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=terraform/state"
        working-directory: infrastructure/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infrastructure/terraform

      - name: Import pre-existing GCP resources
        run: |
          # The bootstrap job creates these via gcloud before Terraform runs.
          # Import them into state so Terraform manages them without re-creating.
          import_if_missing() {
            local addr="$1" id="$2"
            if terraform state show "$addr" &>/dev/null; then
              echo "Already in state: $addr"
            else
              terraform import "$addr" "$id" || echo "Import failed (resource may not exist yet): $addr"
            fi
          }
          import_if_missing \
            module.artifact_registry.google_artifact_registry_repository.images \
            "projects/${TF_VAR_project_id}/locations/${TF_VAR_region}/repositories/${TF_VAR_app_name}"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["anthropic-api-key"]' \
            "projects/${TF_VAR_project_id}/secrets/anthropic-api-key"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["jwt-secret-key"]' \
            "projects/${TF_VAR_project_id}/secrets/jwt-secret-key"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["admin-password"]' \
            "projects/${TF_VAR_project_id}/secrets/admin-password"
          import_if_missing \
            module.storage.google_storage_bucket.sqlite_backup \
            "${TF_VAR_project_id}-sqlite-backup"
        working-directory: infrastructure/terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: infrastructure/terraform

      - name: Terraform Apply
        continue-on-error: true
        run: terraform apply tfplan
        working-directory: infrastructure/terraform

      - name: Show deployment URLs
        if: always()
        run: |
          echo ""
          echo "=== Deployment URLs ==="
          terraform output -raw frontend_url 2>/dev/null && echo "" || echo "frontend_url not available yet"
          terraform output -raw backend_url  2>/dev/null && echo "" || echo "backend_url not available yet"
        working-directory: infrastructure/terraform
