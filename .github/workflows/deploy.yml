name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow health-monitor to trigger a redeploy

# Only one deploy runs at a time. New pushes cancel any in-progress run.
concurrency:
  group: deploy
  cancel-in-progress: true

# Default minimal permissions; each job overrides to the minimum it needs.
permissions:
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  APP_NAME: storming-bastille
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Job 1: Bootstrap ──────────────────────────────────────────────────────
  # Idempotent: enables APIs, creates TF state bucket, AR repo, upserts secrets.
  bootstrap:
    name: Bootstrap GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets are set
        run: |
          fail=0
          check_secret() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "ERROR: GitHub Actions secret '$name' is not set or is empty"
              fail=1
            else
              echo "OK: $name is set (${#value} chars)"
            fi
          }
          check_secret "GCP_PROJECT_ID"    "${{ secrets.GCP_PROJECT_ID }}"
          check_secret "GCP_SA_KEY"        "${{ secrets.GCP_SA_KEY }}"
          check_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          check_secret "JWT_SECRET_KEY"    "${{ secrets.JWT_SECRET_KEY }}"
          check_secret "ADMIN_PASSWORD"    "${{ secrets.ADMIN_PASSWORD }}"
          check_secret "ALERT_EMAIL"       "${{ secrets.ALERT_EMAIL }}"
          [ $fail -eq 0 ] || exit 1

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            storage.googleapis.com \
            storage-component.googleapis.com \
            iam.googleapis.com \
            cloudresourcemanager.googleapis.com \
            compute.googleapis.com \
            monitoring.googleapis.com \
            logging.googleapis.com \
            --project="${PROJECT_ID}" --quiet

      - name: Create Terraform state bucket (idempotent)
        run: |
          BUCKET="${PROJECT_ID}-tf-state"
          if ! gcloud storage buckets describe "gs://$BUCKET" \
               --project="${PROJECT_ID}" &>/dev/null; then
            gcloud storage buckets create "gs://$BUCKET" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --uniform-bucket-level-access
            gcloud storage buckets update "gs://$BUCKET" --versioning
            echo "Created TF state bucket: gs://$BUCKET"
          else
            echo "TF state bucket already exists: gs://$BUCKET"
          fi

      - name: Create Artifact Registry repository (idempotent)
        run: |
          if ! gcloud artifacts repositories describe "${APP_NAME}" \
               --location="${REGION}" \
               --project="${PROJECT_ID}" &>/dev/null; then
            gcloud artifacts repositories create "${APP_NAME}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}"
            echo "Created Artifact Registry repo: ${APP_NAME}"
          else
            echo "Artifact Registry repo already exists: ${APP_NAME}"
          fi

      - name: Upsert Secret Manager secrets
        run: |
          upsert_secret() {
            local name="$1"
            local value="$2"
            if ! gcloud secrets describe "$name" --project="${PROJECT_ID}" &>/dev/null; then
              gcloud secrets create "$name" \
                --project="${PROJECT_ID}" \
                --replication-policy=automatic
            fi
            echo -n "$value" | gcloud secrets versions add "$name" \
              --data-file=- --project="${PROJECT_ID}"
            echo "Upserted secret: $name"
          }
          upsert_secret "anthropic-api-key" "${{ secrets.ANTHROPIC_API_KEY }}"
          upsert_secret "jwt-secret-key"    "${{ secrets.JWT_SECRET_KEY }}"
          upsert_secret "admin-password"    "${{ secrets.ADMIN_PASSWORD }}"

  # ─── Job 2: Build and push Docker images ──────────────────────────────────
  # Uses Docker layer caching (type=gha) so dependency layers are reused across
  # runs. Build+push is atomic — images only appear in the registry if fully pushed.
  push-images:
    name: Build + Push Images
    runs-on: ubuntu-latest
    needs: bootstrap
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ─── Job 3: Terraform apply ────────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: push-images
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region:          us-central1
      TF_VAR_app_name:        storming-bastille
      TF_VAR_alert_email:     ${{ secrets.ALERT_EMAIL }}
      TF_VAR_admin_email:     ${{ secrets.ADMIN_EMAIL }}
      TF_VAR_backend_image:   us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille/backend:${{ github.sha }}
      TF_VAR_frontend_image:  us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storming-bastille/frontend:${{ github.sha }}
      TF_VAR_tf_state_bucket: ${{ secrets.GCP_PROJECT_ID }}-tf-state
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tf-state" \
            -backend-config="prefix=terraform/storming-bastille"
        working-directory: infrastructure/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infrastructure/terraform

      - name: Import pre-existing GCP resources
        run: |
          # The bootstrap job creates these via gcloud before Terraform runs.
          # Import them into state so Terraform manages them without re-creating.
          import_if_missing() {
            local addr="$1" id="$2"
            if terraform state show "$addr" &>/dev/null; then
              echo "Already in state: $addr"
            else
              terraform import "$addr" "$id" || echo "Import failed (resource may not exist yet): $addr"
            fi
          }
          import_if_missing \
            module.artifact_registry.google_artifact_registry_repository.images \
            "projects/${TF_VAR_project_id}/locations/${TF_VAR_region}/repositories/${TF_VAR_app_name}"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["anthropic-api-key"]' \
            "projects/${TF_VAR_project_id}/secrets/anthropic-api-key"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["jwt-secret-key"]' \
            "projects/${TF_VAR_project_id}/secrets/jwt-secret-key"
          import_if_missing \
            'module.secrets.google_secret_manager_secret.secrets["admin-password"]' \
            "projects/${TF_VAR_project_id}/secrets/admin-password"
          import_if_missing \
            module.storage.google_storage_bucket.sqlite_backup \
            "${TF_VAR_project_id}-sqlite-backup"
          import_if_missing \
            module.backend_service.google_cloud_run_v2_service.backend \
            "projects/${TF_VAR_project_id}/locations/${TF_VAR_region}/services/${TF_VAR_app_name}-backend"
          import_if_missing \
            module.frontend_service.google_cloud_run_v2_service.frontend \
            "projects/${TF_VAR_project_id}/locations/${TF_VAR_region}/services/${TF_VAR_app_name}-frontend"
          import_if_missing \
            module.monitoring.google_logging_metric.query_request_count \
            "storming_bastille_query_request_count"
          import_if_missing \
            module.iam.google_service_account.deployer \
            "projects/${TF_VAR_project_id}/serviceAccounts/${TF_VAR_app_name}-deployer@${TF_VAR_project_id}.iam.gserviceaccount.com"
        working-directory: infrastructure/terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan -lock=false
        working-directory: infrastructure/terraform

      - name: Terraform Apply
        run: terraform apply -lock=false tfplan
        working-directory: infrastructure/terraform

      - name: Verify deployment
        if: always()
        run: |
          echo "=== Deployment URLs ==="
          FRONTEND_URL=$(terraform output -raw frontend_url 2>/dev/null || echo "")
          BACKEND_URL=$(terraform output -raw backend_url 2>/dev/null || echo "")
          echo "Frontend: ${FRONTEND_URL:-[not available]}"
          echo "Backend:  ${BACKEND_URL:-[not available]}"

          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: backend_url output is empty — Terraform apply may have failed silently"
            exit 1
          fi

          echo ""
          echo "Waiting for backend health check at $BACKEND_URL/health ..."
          for attempt in $(seq 1 6); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                   --max-time 10 "$BACKEND_URL/health" 2>/dev/null || echo "000")
            echo "Attempt $attempt/6: HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "Backend is live."; exit 0; }
            [ "$attempt" -lt 6 ] && sleep 20
          done
          echo "ERROR: Backend did not become healthy within 2 minutes after deploy"
          exit 1
        working-directory: infrastructure/terraform
